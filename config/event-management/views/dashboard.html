<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | EventPro</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a class="brand" href="/"><span class="brand-mark">E</span> EventPro</a>
      <div class="nav-links"><a href="/">Home</a><a href="/events">Events</a><a href="/contact">Contact</a></div>
      <div class="nav-actions" data-auth-area></div>
    </div>
  </nav>
  <main class="page dashboard-layout">
    <aside class="card sidebar">
      <p class="eyebrow">Profile</p>
      <h2 data-profile-name>User</h2>
      <p>Manage bookings, confirmations, and cancellations from your account.</p>
    </aside>
    <section>
      <div class="section-title">
        <p class="eyebrow">My tickets</p>
        <h1>Booked Events</h1>
      </div>
      <div class="grid" data-bookings></div>
    </section>
  </main>
  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | EventPro</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a class="brand" href="/"><span class="brand-mark">E</span> EventPro</a>
      <button class="btn btn-ghost menu-btn" data-menu>Menu</button>
      <div class="nav-links" data-nav-links><a href="/">Home</a><a href="/events">Events</a><a class="active" href="/contact">Contact</a><a href="/admin">Admin</a></div>
      <div class="nav-actions" data-auth-area></div>
    </div>
  </nav>
  <main class="page section">
    <div class="section-title">
      <p class="eyebrow">Talk to us</p>
      <h1>Contact EventPro</h1>
      <p>Plan a launch, host a private event, or ask about the platform.</p>
    </div>
    <div class="details">
      <form class="card panel form-stack" data-contact-form>
        <input name="name" placeholder="Your name" required>
        <input name="email" type="email" placeholder="Email address" required>
        <textarea name="message" placeholder="Message" required></textarea>
        <button class="btn btn-primary" type="submit">Send Message</button>
        <p>Social: Instagram · LinkedIn · X</p>
      </form>
      <iframe class="map" loading="lazy" allowfullscreen src="https://www.google.com/maps?q=Bengaluru%20India&output=embed"></iframe>
    </div>
  </main>
  <script src="/js/app.js"></script>
  <script src="/js/contact.js"></script>
</body>
</html>

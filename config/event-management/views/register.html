<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | EventPro</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar"><div class="nav-inner"><a class="brand" href="/"><span class="brand-mark">E</span> EventPro</a><div class="nav-actions" data-auth-area></div></div></nav>
  <main class="page auth-shell">
    <section class="auth-card">
      <p class="eyebrow">Join EventPro</p>
      <h1>Create Account</h1>
      <form class="form-stack" data-register-form>
        <input name="name" placeholder="Full name" required>
        <input name="email" type="email" placeholder="Email address" required>
        <input name="phone" placeholder="Phone number">
        <input name="password" type="password" placeholder="Password" minlength="6" required>
        <button class="btn btn-primary" type="submit">Create Account</button>
      </form>
      <p>Already registered? <a class="price" href="/login">Login</a></p>
    </section>
  </main>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>

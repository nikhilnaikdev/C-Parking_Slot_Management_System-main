<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | EventPro</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar"><div class="nav-inner"><a class="brand" href="/"><span class="brand-mark">E</span> EventPro</a><div class="nav-actions" data-auth-area></div></div></nav>
  <main class="page section">
    <section class="auth-shell hidden" data-admin-login>
      <div class="auth-card">
        <p class="eyebrow">Admin access</p>
        <h1>Admin Login</h1>
        <form class="form-stack" data-admin-login-form>
          <input name="email" type="email" placeholder="admin@eventpro.com" required>
          <input name="password" type="password" placeholder="Password" required>
          <button class="btn btn-primary" type="submit">Login as Admin</button>
        </form>
      </div>
    </section>

    <section data-admin-content>
      <div class="section-title">
        <p class="eyebrow">Admin panel</p>
        <h1>Command Center</h1>
      </div>
      <div class="stats" data-stats></div>

      <section class="card panel" style="margin-top: 22px;">
        <h2 data-event-form-title>Add New Event</h2>
        <form class="form-stack" data-event-form>
          <div class="form-row">
            <input name="title" placeholder="Event title" required>
            <input name="category" placeholder="Category" required>
          </div>
          <textarea name="description" placeholder="Event description" required></textarea>
          <div class="form-row">
            <input name="image_url" placeholder="Image URL" required>
            <input name="venue" placeholder="Venue" required>
            <input name="location" placeholder="Location" required>
          </div>
          <div class="form-row">
            <input name="event_date" type="date" required>
            <input name="event_time" type="time" required>
            <input name="price" type="number" min="0" placeholder="Price" required>
          </div>
          <div class="form-row">
            <input name="total_seats" type="number" min="1" placeholder="Total seats" required>
            <input name="available_seats" type="number" min="1" placeholder="Available seats">
          </div>
          <label><input type="checkbox" name="is_featured"> Featured event</label>
          <div class="form-row">
            <button class="btn btn-primary" type="submit" data-event-submit>Create Event</button>
            <button class="btn btn-ghost hidden" type="button" data-event-reset>Cancel Edit</button>
          </div>
        </form>
      </section>

      <section class="card panel" style="margin-top: 22px;">
        <h2>Events</h2>
        <div class="table-wrap"><table><thead><tr><th>Title</th><th>Category</th><th>Date</th><th>Price</th><th>Seats</th><th>Action</th></tr></thead><tbody data-admin-events></tbody></table></div>
      </section>

      <section class="card panel" style="margin-top: 22px;">
        <h2>Users</h2>
        <div class="table-wrap"><table><thead><tr><th>Name</th><th>Email</th><th>Phone</th></tr></thead><tbody data-admin-users></tbody></table></div>
      </section>

      <section class="card panel" style="margin-top: 22px;">
        <h2>Bookings</h2>
        <div class="table-wrap"><table><thead><tr><th>Code</th><th>User</th><th>Event</th><th>Status</th><th>Total</th></tr></thead><tbody data-admin-bookings></tbody></table></div>
      </section>
    </section>
  </main>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
